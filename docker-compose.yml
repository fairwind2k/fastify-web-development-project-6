services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - SESSION_KEY=${SESSION_KEY}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    command: bash -c "npm install --legacy-peer-deps && make build && make db-migrate && make start-backend"